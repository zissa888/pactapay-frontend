html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PactaPay - Fraud Prevention Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
            <div class="text-center mb-8">
                <div class="text-6xl mb-4">🛡️</div>
                <h1 class="text-3xl font-bold text-gray-900">PactaPay</h1>
                <p class="text-gray-600 mt-2">Fraud Prevention Dashboard</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                    <input type="password" id="apiKey" class="w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="Enter API key">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Merchant ID</label>
                    <input type="text" id="merchantId" class="w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="Enter merchant ID">
                </div>
                <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded-md font-medium hover:bg-blue-700">
                    Sign In
                </button>
            </div>
            <p class="text-center text-sm text-gray-600 mt-6">
                Contact: support@pactapay.com.au
            </p>
        </div>
    </div>
    
    <script>
        function login() {
            const apiKey = document.getElementById('apiKey').value;
            const merchantId = document.getElementById('merchantId').value;
            
            if (!apiKey || !merchantId) {
                alert('Please enter both API Key and Merchant ID');
                return;
            }
            
            // Store credentials
            sessionStorage.setItem('pactapay_auth', JSON.stringify({apiKey, merchantId}));
            
            // Redirect to dashboard (we'll create this next)
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
